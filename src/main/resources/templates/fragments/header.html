<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
</head>
<body>
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg header"
         style="border-bottom: 1px solid var(--bs-gray-600);
         border-top: 1px solid var(--bs-gray-600);
         background: linear-gradient(135deg, var(--bs-gray-800) 0%, var(--bs-black) 100%);">
        <div class="container-fluid">
            <img th:src="@{/images/logo-myanswers.png}" alt="Logo"
                 class="navbar-brand ms-lg-5 ms-0" style="width: 10rem; height: 10rem"/>

                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav w-100 flex-lg-row flex-column mb-2 mb-lg-0 justify-content-lg-between align-items-center">
                    <li class="nav-item" >
                        <button class="nav-link text-light border border-primary rounded-pill px-4" aria-current="page" type="button" id="about_me">About Me</button>
                    </li>
                    <li class="nav-item ms-lg-auto">
                        <a class="nav-link text-light me-lg-5 me-0" aria-current="page" href="#">Login</a>

                </ul>
