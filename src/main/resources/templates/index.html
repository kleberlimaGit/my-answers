<!DOCTYPE html>

<html lang="pt" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Título</title>
    <meta charset="UTF-8"/>
    <meta name="robots" content="noindex">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport"
          content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <!-- <link rel="icon" th:href="@{/image/logo.jpg}" /> -->
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-atom-dark.min.css" integrity="sha512-GZPS1oCebjx8g/ZkrTTvWirW+4wDkzIsilUQPXcZzuDpDzoH5brM2AojiFjo6ObIWeM68ZDostvdjaS9MNYCTg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght@17..18,400..700&display=swap"
          rel="stylesheet">

</head>

<body class="d-flex flex-column">
<header th:insert="~{fragments/header :: header}"></header>
<main th:insert="~{fragments/main :: main}"></main>
<div th:replace="~{fragments/modal-about-me :: modal-about-me}"></div>

<section class="container mt-5 px-0">
    <div class="row mx-auto">
        <div class="col-lg-6 col-12">
            <div class="input-group mb-3">
                <input type="text" class="form-control bg-transparent" id="input-execute"
                       th:placeholder="#{app.placeholder.input}" aria-label="Text">
                <button class="btn btn-info px-4" type="button" id="btn-execute"
                        th:text="#{app.button.execute}">Execute</button>
            </div>
        </div>
    </div>
</section>

<section  class="container mt-2 mb-4 rounded px-5 d-flex align-items-center justify-content-start" style="background-color: var(--bs-gray-700);">
    <pre  class="mt-3" id="question-content"></pre >
</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/index.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.9.0/prism.min.js" integrity="sha512-KnX1xdVSdEHliREuSgUX9kgmit/Wk63n4X3cjoWfISEVsi2Qi2NW88dYyKXCCS8YcFMgzHywK3BIafTfhK2Tig==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script th:inline="javascript">
    let lang = [[${lang}]];
    let page = [[${pageAnswers}]]
    let inputSizeError = [[#{app.input.size.error}]]
    let inputEmpty = [[#{app.input.empty.error}]]
</script>
</body>
</html>
